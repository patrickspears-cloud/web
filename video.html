        <script>
        var video, speed, volume;
            function inti(){
                video= document.getElementById('myvideo');
                speed= video.playbackRate;
                volume = 0.5;
                video.volume = volume;
            }
            function play() {
                video.play();
            }
            function changeSpeed(direction) {
                if (direction == 'up') {
                    if (speed < 10) {
                        speed = speed + 0.1;
                    }
                }
                else if (direction == 'down') {
                    if (speed > 0){
                        speed=speed-0.1;
                    }
                }
                video.playbackRate = speed;
            }
            function changeVolume(direction) {
                if (direction == 'up') {
                    if (volume < 0.9) {
                        volume = volume + 0.1;
                    }
                }
                else if (direction == 'down'){
                    if (volume > 0.1) {
                        volume = volume -0.1;
                    }
                }
                video.volume = volume;
            }
            window.onload = init;
        </script>
