            function updateTime(){
                var now=new Date();
                var hours=now.getHours();
                var minutes=now.getMinutes();
                var seconds=now.getSeconds();
                
                if (minutes < 10) {
                    minutes = '0' + minutes;
                }
                if (seconds < 10) {
                    seconds = '0' + seconds;
                }
                if (hours >= 12 && hours < 24) {
                    var timeOfDay = 'pm';
                }
                else {
                    var timeOfDay = 'am';
                }
                if (hours > 12){
                    hours = hours - 12;
                }
                
                var currentTime =hours+':'+minutes+':'+seconds+' '+timeOfDay;
                var myClock=document.getElementById('clock');
                myClock.innerHTML=currentTime;
            }
        </script>
        <style>
        div#clock { background-color: #f1feff;
            margin: 20px 28em;
            border: solid #000000;
            border-width: 2px;
            border-radius: 1em;
            }
        </style>
    </head>
